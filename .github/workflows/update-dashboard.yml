name: Update RevNox Dashboard

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 min
    - cron: '0 * * * *'     # Top of every hour (keeps workflow "active" so cron doesn't get disabled)
  push:
    branches: [master]      # Re-runs after each self-commit → self-sustaining loop
    paths:
      - 'run.js'             # Only on code changes, not every dashboard.html push
  workflow_dispatch:         # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run dashboard generator
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          AMAZON_CLIENT_ID: ${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET: ${{ secrets.AMAZON_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN: ${{ secrets.AMAZON_REFRESH_TOKEN }}
          AMAZON_PROFILE_ID: ${{ secrets.AMAZON_PROFILE_ID }}
          AMAZON_API_ENDPOINT: ${{ secrets.AMAZON_API_ENDPOINT }}
        run: node run.js

      - name: Commit & push updated dashboard
        run: |
          git config user.name  "RevNox Bot"
          git config user.email "bot@revnoxmedia.com"
          git add dashboard.html
          git diff --cached --quiet || git commit -m "📊 Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
